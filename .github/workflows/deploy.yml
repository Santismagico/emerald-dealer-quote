# Publica solamente cuando Santiago o un responsable la ordena manualmente.
name: Deploy a GitHub Pages

on:
  workflow_dispatch:
    inputs:
      n6_evidence_commit:
        description: Commit exacto que aprobó la prueba real N6
        required: true
        type: string
      release_confirmation:
        description: Escribe PUBLICAR para confirmar la salida
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Confirmar candidata y autorización humana
        env:
          N6_EVIDENCE_COMMIT: ${{ inputs.n6_evidence_commit }}
          RELEASE_CONFIRMATION: ${{ inputs.release_confirmation }}
        run: |
          test "$N6_EVIDENCE_COMMIT" = "$GITHUB_SHA"
          test "$RELEASE_CONFIRMATION" = "PUBLICAR"
      - run: npm audit --audit-level=high
      - run: npm run security:secrets:test
      - run: npm run security:secrets
      - run: npm run security:evidence
      - run: npm test
      - run: npm run build
        env:
          DEPLOY_BASE: /emerald-dealer-quote/
      - run: npm run security:record
      - uses: actions/upload-artifact@v4
        with:
          name: evidencia-publicacion-${{ github.sha }}
          path: security-evidence/release-evidence.json
          retention-days: 90
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
