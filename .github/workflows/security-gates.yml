name: Controles de seguridad

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run security:secrets:test
      - run: npm run security:secrets
      - run: npm run security:evidence
      - run: npm test
      - run: npm run build
      - run: npm run security:record
      - uses: actions/upload-artifact@v4
        with:
          name: evidencia-seguridad-${{ github.sha }}
          path: security-evidence/release-evidence.json
          retention-days: 90
